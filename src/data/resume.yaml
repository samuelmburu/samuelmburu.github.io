    highlights:
      - Defined frontend architecture for a React + TypeScript mono-repo, enabling multiple applications to scale independently.
      - Partnered with ML teams to integrate classification and automation systems into user workflows.
      - Established frontend standards for A11y, analytics, performance, and testing, improving consistency and maintainability.
      - Built shared UI systems and tooling that reduced developer friction and accelerated feature delivery.
      - Acted as primary frontend partner to product and design, translating ambiguous requirements into scalable implementations.
    impact: >
      Enabled scalable product development while integrating ML capabilities
      into user-facing workflows.

  - company: Survata
