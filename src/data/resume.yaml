experience:
  - company: WITNESS AI
    title: Senior Software Engineer
    scope: Staff-level scope
    start: 2023-01
    end: 2026-01
    summary: >
      First UI engineer, responsible for establishing frontend architecture and
      enabling cross-team delivery for a rapidly evolving SaaS platform.
    highlights:
      - Established the frontend architecture (React + TypeScript), defining component systems, API contracts, and patterns adopted across the product.
      - Designed, implemented, and documented a company-wide RBAC system, retrofitting the existing application and standardizing permission enforcement across all UI surfaces.
      - Defined and aligned on RBAC API contracts with backend, enabling consistent client-side enforcement and simplifying feature development.
      - Partnered with ML, backend, and product teams to surface model outputs through intuitive UI workflows.
      - Led integration of enterprise SSO (WorkOS), enabling secure onboarding and supporting enterprise customer adoption.
      - Coordinated across stakeholders to navigate ambiguity and align delivery in a fast-moving product environment.
      - Built and evolved frontend delivery practices (CI/CD, release workflows), improving iteration speed and reliability.
    impact: >
      Implemented RBAC and WorkOS SSO integrations, elevating the frontend into
      a first-class product layer used for secure, role-based workflows and
      enabling WITNESS AI to engage multiple large enterprise clients.

  - company: Southwest Airlines
    title: Senior Software Engineer
    scope: Consultant, Staff-level scope
