    highlights:
      - Architected and owned frontend systems across an AngularJS to React migration, enabling long-term platform evolution.
      - Built a data visualization platform (D3-based plugin system) used across the product.
      - Improved performance and responsiveness through architectural changes, including TTFB reduction and WebWorkers.
      - Established developer workflows, documentation, and standards that reduced onboarding time from 1 week to 1 day.
      - Increased team productivity by approximately 2 hours per day per engineer through tooling and workflow improvements.
      - Mentored engineers and raised frontend quality across the organization.
    impact: >
      Scaled frontend from a single engineer to a mature platform supporting
      product growth and team expansion.

