    end: 2023-05
    summary: >
      Staff-level contributor on a large-scale modernization initiative
      migrating critical systems to a cloud-native architecture.
    highlights:
      - Led frontend decomposition of a legacy monolith into micro-frontends (Single-SPA), enabling independent team ownership and parallel delivery.
      - Defined frontend boundaries and API contracts, reducing coupling and improving system maintainability.
      - Built a GraphQL/BFF layer transforming legacy APIs into UI-optimized read models, simplifying client complexity.
      - Designed event-driven integrations (Lambda, Kinesis, DynamoDB) to decouple frontend from backend availability constraints.
      - Enabled safe, incremental migration through feature flags and controlled cutovers, reducing risk in a production-critical system.
      - Mentored engineers and elevated code quality through architectural guidance and targeted reviews.
    impact: >
      Reduced system complexity, improved delivery velocity, and enabled
      scalable frontend ownership across teams.

  - company: Confidential Client (NDA)
    title: Lead Frontend Engineer
